# Registers the web app so the Shopify CLI reverse proxy sets a `default` route (without it, GET / → 500 "Invalid path /").
name = "remix"
roles = ["frontend", "backend"]
webhooks_path = "/webhooks/app/uninstalled"

[commands]
predev = "npx prisma generate"
dev = "npx prisma migrate deploy && npx remix vite:dev"
